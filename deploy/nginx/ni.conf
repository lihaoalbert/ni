# ni.conf — nginx server block for ni.idata.mobi
# 用法:
#   1. cp deploy/nginx/ni.conf /etc/nginx/sites-available/ni.conf
#   2. ln -s /etc/nginx/sites-available/ni.conf /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#   4. certbot --nginx -d ni.idata.mobi   # 申请 TLS,会自动改写本文件
#
# 路由:
#   /                       → backend (FastAPI :8000)
#   /api/platform/*         → backend 转发到 ips-mock (:8001)
#   /v1/*                   → backend 转发到 ips-mock (SDK 走这里)
#   /api/voice/*            → backend (火山 TTS / STT,本地合成)
#   /api/llm/*              → backend (Claude API 代理)
#
# 跟 ibi.idata.mobi 共用 80/443,通过 server_name 区分。

# ===== HTTP (certbot 之前) =====
server {
    listen 80;
    listen [::]:80;
    server_name ni.idata.mobi;

    # Let's Encrypt 验证用 — certbot 会自动加,这里先放好
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 健康检查用 — backend /health
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }

    # 其余全部走 backend(:8000)
    # backend 自己处理 /v1/* → ips-mock 的内部转发
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 流式响应需要禁用缓冲
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;   # LLM 流式回复可能很久
        proxy_send_timeout 300s;

        # 大请求体 — TTS 上传文本一般很小,但 audio upload 留余量
        client_max_body_size 10m;
    }
}

# ===== HTTPS (certbot 之后会自动生成 server { listen 443 ... } block) =====
# certbot 会把 80 block 改成 301 跳 443,并插入 443 server block。
# 如果你需要手写,模板如下(等 certbot 跑完一次再决定要不要覆盖):
