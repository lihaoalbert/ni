# ni.conf — ni.idata.mobi server block
# 部署位置:/etc/nginx/conf.d/ni.conf (RedHat 风格,跟 ibiren 一致)
# 生效:nginx -t && systemctl reload nginx
#
# SSL 复用 ibi.idata.mobi 的 wildcard 证书(DigiCert *.idata.mobi,2027-01 到期)
# — 不需要 certbot,放 ni.conf 直接用即可。
#
# 路由:
#   /                  → backend (FastAPI :8000)
#   backend 内部把 /v1/* 转发到 ips-mock (:8001)
#   /health            → backend (直返,不走 access log)
#
# 跟 ibiren 共用 nginx,通过 server_name 区分,不冲突。

# ============================================================
# HTTP → HTTPS 重定向 (80 端口)
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name ni.idata.mobi;

    # Let's Encrypt 备用(我们当前用 wildcard 不需要,留着将来切)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 健康检查(明文,LB / 监控用)
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # 其余全部 301 → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS · ni.idata.mobi (复用 ibi.idata.mobi wildcard cert)
# ============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ni.idata.mobi;

    # 复用 wildcard 证书
    ssl_certificate     /etc/nginx/ssl/idata.mobi.pem;
    ssl_certificate_key /etc/nginx/ssl/idata.mobi.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50m;

    # ===== 路由:平台 API → ips-mock,其余 → backend =====

    # 平台 mock API(/v1/*) 走 ips-mock (iOS 调 /v1/auth/login /v1/ips)
    location /v1/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # chat / voice / memories 走 backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE / 流式响应 — 禁用缓冲,LLM 流式回复 + TTS 长文本
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 健康检查 (走 SSL,但不记 access log)
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }
}